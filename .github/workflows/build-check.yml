name: Build Check & Lint Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run code schema linter
      run: npm run lint

    - name: Build system production bundle
      run: npm run build
